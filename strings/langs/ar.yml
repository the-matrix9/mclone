start_5: "<blockquote><b>↝ الدردشة في القائمة السوداء ↜</b>\n\nتم إدراج هذه الدردشة في قاعدة بيانات {0} كدردشة في القائمة السوداء.\nقدم طلبًا لمستخدم <a href={1}>سودو</a> لإزالة الدردشة من القائمة السوداء أو قم بزيارة <a href={2}>دردشة الدعم.</a></blockquote>"
start_6: "<blockquote expandable><b>😲 معلومات المقطع 😲</b>\n\n<b>📌 العنوان :</b> {0}\n\n<b>⏳ المدة :</b> {1} دقيقة\n<b>👀 المشاهدات :</b> <code>{2}</code>\n<b>⏰ نشر في :</b> {3}\n<b>📎 القناة :</b> <a href={4}>{5}</a>\n\n<u><b>🥀 البحث مدعوم من قبل {6}</b></u></blockquote>"


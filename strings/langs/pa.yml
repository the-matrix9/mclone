setting_1: "<blockquote><u><b>{0} ਸੈਟਿੰਗ ਪੈਨਲ</b></u>\n\n<b>ਚੈਟ ਆਈਡੀ :</b> <code>{1}</code>\n<b>ਚੈਟ ਸਿਰਲੇਖ :</b> {2}\n\nਸੈਟਿੰਗਾਂ ਬਦਲਣ ਲਈ ਹੇਠਾਂ ਦਿੱਤੇ ਬਟਨਾਂ 'ਤੇ ਕਲਿਕ ਕਰੋ।</blockquote>"
setting_2: "<blockquote><b>» ਡਾਇਰੈਕਟ :</b> ਖੋਜ ਬੇਨਤੀ ਨੂੰ ਸਿੱਧਾ ਚਲਾਉਂਦਾ ਹੈ।\n\n<b>» ਇਨਲਾਈਨ :</b> ਵੀਡੀਓ ਅਤੇ ਆਡੀਓ ਵਿਚਕਾਰ ਚੋਣ ਕਰਨ ਲਈ ਇਨਲਾਈਨ ਬਟਨ ਦਿੰਦਾ ਹੈ।</blockquote>"
setting_3: "<blockquote><b>» ਸਾਰੇ :</b> ਕੋਈ ਵੀ ਵਿਅਕਤੀ ਇਸ ਗਰੁੱਪ ਵਿੱਚ ਐਡਮਿਨ ਕਮਾਂਡਾਂ [ਸਕਿਪ, ਪੌਜ਼, ਰੀਜ਼ਿਊਮ ਆਦਿ] ਵਰਤ ਸਕਦਾ ਹੈ।\n\n<b>» ਸਿਰਫ ਐਡਮਿਨ :</b> ਸਿਰਫ ਐਡਮਿਨ ਅਤੇ ਮਨਜ਼ੂਰ ਉਪਭੋਗਤਾ ਹੀ ਕਮਾਂਡਾਂ ਵਰਤ ਸਕਦੇ ਹਨ।</blockquote>"
setting_4: "<blockquote><b>» ਕੋਈ ਮਨਜ਼ੂਰ ਉਪਭੋਗਤਾ ਨਹੀਂ ਮਿਲਿਆ।</b></blockquote>"
setting_5: "<blockquote><b>» ਗਰੁੱਪ :</b> ਉਸੇ ਗਰੁੱਪ ਵਿੱਚ ਸੰਗੀਤ ਵਜਾਉਂਦਾ ਹੈ ਜਿੱਥੇ ਕਮਾਂਡ ਦਿੱਤੀ ਗਈ ਹੋਵੇ।\n\n<b>» ਚੈਨਲ :</b> ਤੁਹਾਡੇ ਚੁਣੇ ਹੋਏ ਚੈਨਲ ਵਿੱਚ ਸੰਗੀਤ ਵਜਾਉਂਦਾ ਹੈ। ਚੈਨਲ ਆਈਡੀ <b>/channelplay</b> ਰਾਹੀਂ ਸੈੱਟ ਕਰੋ।</blockquote>"
setting_6: "<blockquote><b>» ਸਾਰੇ :</b> ਇਸ ਗਰੁੱਪ ਵਿੱਚ ਮੌਜੂਦ ਕੋਈ ਵੀ ਵਿਅਕਤੀ ਸੰਗੀਤ ਵਜਾ ਸਕਦਾ ਹੈ।\n\n<b>» ਸਿਰਫ ਐਡਮਿਨ :</b> ਸਿਰਫ ਐਡਮਿਨ ਹੀ ਇਸ ਗਰੁੱਪ ਵਿੱਚ ਸੰਗੀਤ ਵਜਾ ਸਕਦੇ ਹਨ।</blockquote>"
setting_7: "<blockquote><b>» ਕਿਰਪਾ ਕਰਕੇ /channelplay ਰਾਹੀਂ ਚੈਨਲ ਆਈਡੀ ਸੈੱਟ ਕਰੋ।</b></blockquote>"

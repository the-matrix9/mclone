lang_1: "<blockquote><b>» ਕਿਰਪਾ ਕਰਕੇ ਉਹ ਭਾਸ਼ਾ ਚੁਣੋ ਜਿਸਨੂੰ ਤੁਸੀਂ ਇਸ ਗਰੁੱਪ ਦੀ ਮੂਲ ਭਾਸ਼ਾ ਵਜੋਂ ਸੈੱਟ ਕਰਨਾ ਚਾਹੁੰਦੇ ਹੋ :</b></blockquote>"

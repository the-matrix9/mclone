start_1: "<blockquote><b>{0} ਜਿੰਦਾ ਹੈ ਬੇਬੀ।</b>\n\n<b>✫ ਅਪਟਾਈਮ :</b> {1}</blockquote>"
start_2: "<blockquote expandable><b>ਸਤਿ ਸ੍ਰੀ ਅਕਾਲ {0}, 🥀</b>\n\n<b>๏ ਇਹ {1} ਹੈ!</b>\n\n<b>➻ ਇੱਕ ਤੇਜ਼ ਅਤੇ ਸ਼ਕਤੀਸ਼ਾਲੀ ਟੈਲੀਗ੍ਰਾਮ ਸੰਗੀਤ ਪਲੇਅਰ ਬੋਟ ਜਿਸ ਵਿੱਚ ਸ਼ਾਨਦਾਰ ਵਿਸ਼ੇਸ਼ਤਾਵਾਂ ਹਨ।</b>\n\n<b><u>ਸਮਰਥਿਤ ਪਲੇਟਫਾਰਮ :</b></u> <b>ਯੂਟਿਊਬ, ਸਪੋਟੀਫਾਈ, ਰੈਸੋ, ਐਪਲ ਮਿਊਜ਼ਿਕ ਅਤੇ ਸਾਊਂਡਕਲਾਉਡ।</b>\n──────────────────\n<b>๏ ਮੇਰੇ ਮੋਡਿਊਲਾਂ ਅਤੇ ਕਮਾਂਡਾਂ ਬਾਰੇ ਜਾਣਕਾਰੀ ਪ੍ਰਾਪਤ ਕਰਨ ਲਈ ਮਦਦ ਬਟਨ 'ਤੇ ਕਲਿਕ ਕਰੋ।</b></blockquote>"
start_3: "<blockquote><b>ਸਤਿ ਸ੍ਰੀ ਅਕਾਲ {0},</b>\n<b>ਇਹ {1} ਹੈ।</b>\n\n<b>ਮੈਨੂੰ {2} ਵਿੱਚ ਸ਼ਾਮਲ ਕਰਨ ਲਈ ਧੰਨਵਾਦ, {3} ਹੁਣ ਇਸ ਚੈਟ ਵਿੱਚ ਗਾਣੇ ਵਜਾ ਸਕਦਾ ਹੈ।</b></blockquote>"
start_4: "<blockquote><b>❍ ਸੁਪਰਗਰੁੱਪ ਦੀ ਲੋੜ ਹੈ ❍</b>\n\nਕਿਰਪਾ ਕਰਕੇ ਆਪਣੇ <b>ਗਰੁੱਪ</b> ਨੂੰ <b>ਸੁਪਰਗਰੁੱਪ</b> ਵਿੱਚ ਬਦਲੋ ਅਤੇ ਫਿਰ ਮੈਨੂੰ ਦੁਬਾਰਾ ਸ਼ਾਮਲ ਕਰੋ।\n\n<b>ਸੁਪਰਗਰੁੱਪ ਕਿਵੇਂ ਬਣਾਈਏ?</b>\n- ਆਪਣੇ ਗਰੁੱਪ ਦੀ ਚੈਟ ਹਿਸਟਰੀ ਨੂੰ ਇੱਕ ਵਾਰ <b>ਦਿੱਖਣਯੋਗ (Visible)</b> ਕਰੋ।</blockquote>"
start_5: "<blockquote><b>↝ ਬਲੈਕਲਿਸਟ ਕੀਤੀ ਗਈ ਚੈਟ ↜</b>\n\nਇਹ ਚੈਟ {0} ਡੇਟਾਬੇਸ 'ਤੇ ਬਲੈਕਲਿਸਟ ਹੈ।\nਆਪਣੀ ਚੈਟ ਨੂੰ ਅਨਬਲੈਕਲਿਸਟ ਕਰਵਾਉਣ ਲਈ <a href={1}>ਸੁਡੋ ਉਪਭੋਗਤਾ</a> ਨੂੰ ਬੇਨਤੀ ਕਰੋ ਜਾਂ <a href={2}>ਸਹਾਇਤਾ ਚੈਟ 'ਤੇ ਜਾਓ।</a></blockquote>"
start_6: "<blockquote expandable><b>😲 ਟ੍ਰੈਕ ਜਾਣਕਾਰੀ 😲</b>\n\n<b>📌 ਸਿਰਲੇਖ :</b> {0}\n\n<b>⏳ ਮਿਆਦ :</b> {1} ਮਿੰਟ\n<b>👀 ਵਿਊਜ਼ :</b> <code>{2}</code>\n<b>⏰ ਪ੍ਰਕਾਸ਼ਿਤ :</b> {3}\n<b>📎 ਚੈਨਲ :</b> <a href={4}>{5}</a>\n\n<u><b>🥀 ਖੋਜ ਪਾਵਰਡ ਬਾਏ {6}</b></u></blockquote>"

help_1: "<blockquote><b>ਜਿਸ ਸ਼੍ਰੇਣੀ ਲਈ ਤੁਸੀਂ ਮਦਦ ਚਾਹੁੰਦੇ ਹੋ ਉਸਨੂੰ ਚੁਣੋ।</b>\nਆਪਣੇ ਸਵਾਲ <a href={0}>ਸਹਾਇਤਾ ਚੈਟ</a> ਵਿੱਚ ਪੁੱਛੋ।\n\n<b>ਸਾਰੀਆਂ ਕਮਾਂਡਾਂ ਦੀ ਵਰਤੋਂ ਇਸ ਨਾਲ ਕਰੋ :</b> <code>/</code></blockquote>"
